kind = "web"
previewPath = "/"
title = "NAR Clothing"
version = "1.0.0"
id = "artifacts/nar-clothing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21305

[services.development]
run = "pnpm --filter @workspace/nar-clothing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nar-clothing", "run", "build" ]
publicDir = "artifacts/nar-clothing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21305"
BASE_PATH = "/"
